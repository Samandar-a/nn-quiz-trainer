let category="Все",mode="normal",order=[],index=0,selected=null,score=0,answered=0;
let mistakes=JSON.parse(localStorage.getItem("tax_quiz_mistakes")||"[]");
const el=id=>document.getElementById(id);
function save(){localStorage.setItem("tax_quiz_mistakes",JSON.stringify(mistakes));el("mistakesBtn").textContent="Повторить ошибки: "+mistakes.length}
function cats(){return ["Все",...Array.from(new Set(QUESTIONS.map(q=>q.category)))]}
function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function base(){if(mode==="mistakes"){let ids=new Set(mistakes.map(m=>m.id));let bad=QUESTIONS.filter(q=>ids.has(q.id));return bad.length?bad:QUESTIONS}return category==="Все"?QUESTIONS:QUESTIONS.filter(q=>q.category===category)}
function reset(m=mode){mode=m;index=0;selected=null;score=0;answered=0;order=sh(base());render()}
function startNormal(){reset("normal")}function startMistakes(){reset("mistakes")}function clearMistakes(){mistakes=[];save();reset("normal")}
function render(){save();el("finish").style.display="none";el("quiz").style.display="block";if(!order.length)order=sh(base());let q=order[index];let acc=answered?Math.round(score/answered*100):0;el("progress").style.width=Math.round(((index+(selected?1:0))/order.length)*100)+"%";el("catChip").textContent=q.category;el("numChip").textContent=(index+1)+" / "+order.length;el("scoreChip").textContent="Счёт: "+score+" / "+answered;el("accChip").textContent="Точность: "+acc+"%";el("question").textContent=q.question;el("options").innerHTML="";sh(q.options).forEach((opt,i)=>{let b=document.createElement("button");b.className="opt";b.innerHTML=`<span class="letter">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;b.onclick=()=>pick(opt);el("options").appendChild(b)});el("result").className="res";el("result").innerHTML="";el("next").disabled=true;el("next").textContent=index+1>=order.length?"Завершить":"Следующий вопрос";el("showAnswer").disabled=false}
function pick(ans){if(selected)return;selected=ans;answered++;let q=order[index];let ok=ans===q.answer;if(ok)score++;if(!ok&&!mistakes.some(m=>m.id===q.id))mistakes.push({id:q.id});show(ok)}
function show(ok){let q=order[index];document.querySelectorAll(".opt").forEach(b=>{let t=b.innerText.slice(1).trim();b.disabled=true;if(t===q.answer)b.classList.add("correct");if(t===selected&&t!==q.answer)b.classList.add("wrong")});let r=el("result");r.className="res "+(ok?"good":"bad");r.innerHTML=`<b>${ok?"Правильно ✅":"Неправильно ❌"}</b><br>Правильный ответ: <b>${q.answer}</b>`;el("next").disabled=false;el("showAnswer").disabled=true;save();let acc=answered?Math.round(score/answered*100):0;el("scoreChip").textContent="Счёт: "+score+" / "+answered;el("accChip").textContent="Точность: "+acc+"%"}
function fin(){el("quiz").style.display="none";el("finish").style.display="block";let bad=answered-score,acc=answered?Math.round(score/answered*100):0;el("finishTitle").textContent=acc>=85?"Красавчик 🔥":acc>=60?"Нормально, ещё повтори":"Нужно повторить ошибки";el("fg").textContent=score;el("fb").textContent=bad;el("fa").textContent=acc+"%"}
el("next").onclick=()=>{if(index+1>=order.length)fin();else{index++;selected=null;render()}};
el("showAnswer").onclick=()=>{if(selected)return;selected=order[index].answer;answered++;score++;show(true)};
el("shuffle").onclick=()=>reset("normal");el("restart").onclick=()=>reset(mode);el("mistakesBtn").onclick=()=>reset("mistakes");
el("category").onchange=e=>{category=e.target.value;reset("normal")};
el("total").textContent=QUESTIONS.length;cats().forEach(c=>{let o=document.createElement("option");o.value=c;o.textContent=c;el("category").appendChild(o)});
save();reset("normal");
</script>
